<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloads</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    text-align:center;
    padding:50px;
}

h1{
    color:#00ff88;
}

.link-card{
    background:#1f2937;
    max-width:500px;
    margin:20px auto;
    padding:20px;
    border-radius:10px;
}

button{
    background:#00ff88;
    color:black;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#00cc6a;
}

a{
    color:white;
    text-decoration:none;
}
</style>
</head>
<body>

<h1> Links</h1>

<div class="link-card">
    <h2>My Script Website</h2>
    <p>Click below to visit.</p>
    <button onclick="window.open('https://example.com', '_blank')">
        Visit Site
    </button>
</div>

<div class="link-card">
    <h2>YouTube Channel</h2>
    <p>Watch tutorials and showcases.</p>
    <button onclick="window.open('https://youtube.com', '_blank')">
        Watch Videos
    </button>
</div>

<br><br>

</body>
</html>
